services:
  jenkins:
    container_name: jenkins-poc
    build: .
    ports:
      - "8081:8080"
    environment:
      - JENKINS_ADMIN_PASSWORD=${JENKINS_ADMIN_PASSWORD}
      - GITOPS_PR_PAT=${GITOPS_PR_PAT}
      - CASC_JENKINS_CONFIG=/usr/share/jenkins/ref/casc.yaml
    volumes:
      - "jenkins-data:/var/jenkins_home"
    networks:
      default:
      kind:
        aliases:
          - jenkins

volumes:
  jenkins-data:

networks:
  kind:
    external: true
